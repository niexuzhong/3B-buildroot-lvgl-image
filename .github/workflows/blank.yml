name: RPi3 Buildroot Industrial Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # =========================
    # 1. checkout
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # 2. deps
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git wget cpio unzip rsync bc file python3 libncurses5-dev

    # =========================
    # 3. clone buildroot
    # =========================
    - name: Clone Buildroot
      run: |
        git clone https://github.com/buildroot/buildroot.git
        cd buildroot
        git checkout 2024.02

    # =========================
    # 4. config
    # =========================
    - name: Configure Raspberry Pi 3
      run: |
        cd buildroot
        make raspberrypi3_defconfig

    # enable SDK
    - name: Enable SDK
      run: |
        cd buildroot
        echo "BR2_SDK_BUILD=y" >> .config
        make olddefconfig

    # =========================
    # 5. cache dirs
    # =========================
    - name: Setup download cache
      run: |
        mkdir -p buildroot-dl
        echo "BR2_DL_DIR=$GITHUB_WORKSPACE/buildroot-dl" >> $GITHUB_ENV

    # =========================
    # 6. build system
    # =========================
    - name: Build system
      run: |
        cd buildroot
        make -j$(nproc)

    # =========================
    # 7. build SDK
    # =========================
    - name: Build SDK
      run: |
        cd buildroot
        make sdk

    # =========================
    # 8. package artifacts
    # =========================
    - name: Package outputs
      run: |
        mkdir -p out

        cp buildroot/output/images/sdcard.img out/

        tar -czf sdk.tar.gz buildroot/output/host
        tar -czf dl-cache.tar.gz buildroot-dl
        tar -czf output.tar.gz buildroot/output

    # =========================
    # 9. upload artifacts (CI下载用)
    # =========================
    - name: Upload SD image
      uses: actions/upload-artifact@v4
      with:
        name: sdcard-image
        path: out/sdcard.img

    - name: Upload SDK
      uses: actions/upload-artifact@v4
      with:
        name: sdk
        path: sdk.tar.gz

    - name: Upload cache
      uses: actions/upload-artifact@v4
      with:
        name: dl-cache
        path: dl-cache.tar.gz

    # =========================
    # 10. CREATE RELEASE（关键）
    # =========================
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Buildroot Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        files: |
          out/sdcard.img
          sdk.tar.gz
          dl-cache.tar.gz
          output.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
